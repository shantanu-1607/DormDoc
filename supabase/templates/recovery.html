<!doctype html>
<html>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #FAF7F2; margin: 0; padding: 24px;">
    <div style="max-width: 480px; margin: 0 auto; background: #ffffff; border: 1px solid rgba(15, 24, 64, 0.08); border-radius: 12px; padding: 32px;">
      <h1 style="color: #7B1E1E; font-size: 22px; margin: 0 0 8px; font-weight: 700;">DormDoc recovery code</h1>
      <p style="color: #5A5A5A; font-size: 14px; line-height: 1.6; margin: 0 0 24px;">
        Enter the code below to recover access to your account.
      </p>
      <div style="background: #FAF7F2; border: 1px solid rgba(15, 24, 64, 0.08); border-radius: 12px; padding: 22px; text-align: center;">
        <div style="color: #7B1E1E; font-size: 34px; letter-spacing: 0.22em; font-weight: 700;">{{ .Token }}</div>
      </div>
      <p style="color: #5A5A5A; font-size: 12px; line-height: 1.6; margin: 24px 0 0;">
        Didn't request this? You can safely ignore the email.
      </p>
    </div>
  </body>
</html>
